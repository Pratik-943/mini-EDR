name: Build Universal Agent

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'requirements.txt'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build universal agent.exe
        # No IP injection needed — the agent reads the URL from command-line args at runtime
        run: pyinstaller --onefile --noconsole --name agent agent/main.py

      - name: Create payloads directory and copy agent
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "server\payloads" -Force
          Copy-Item "dist\agent.exe" "server\payloads\agent.exe"
          Write-Host "agent.exe size: $((Get-Item 'server\payloads\agent.exe').Length / 1MB) MB"

      - name: Commit and push agent.exe back to repo
        shell: bash
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f server/payloads/agent.exe
          git diff --staged --quiet || git commit -m "ci: auto-build universal agent.exe [skip ci]"
          git push
